<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>场馆排班列表</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <style>
    :root {
      --brand: #ad3004;
      --brand-deep: #7f1f00;
      --card: #ffffff;
      --text: #2b2b2b;
      --muted: #666;
      --border: #d9d9d9;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
      Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, rgba(173, 48, 4, 0.82), rgba(127, 31, 0, 0.85));
      color: var(--text);
      padding: 14px 12px 20px;
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      padding-top: max(16px, env(safe-area-inset-top));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    .page {
      width: 100%;
      margin: 0 auto;
      max-width: 680px;
    }
    .page-shell {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 14px;
      padding: 8px 8px 10px;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.14);
    }
    .venue-card {
      background: var(--card);
      border-radius: 11px;
      padding: 22px 10px 12px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.58);
    }
    .venue-card:last-child {
      margin-bottom: 0;
    }
    .board-title {
      text-align: center;
      margin-bottom: 8px;
      color: var(--text);
      line-height: 1.22;
    }
    .board-title-main {
      display: block;
      font-size: 25px;
      letter-spacing: 0.8px;
      font-weight: 600;
    }
    .board-title-sub {
      display: block;
      margin-top: 2px;
      font-size: 21px;
      letter-spacing: 0.4px;
      font-weight: 500;
    }
    .board-subtitle {
      text-align: center;
      color: var(--brand);
      font-size: 16px;
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      line-height: 1.3;
    }
    .schedule-table-wrap {
      border: 1px solid #a6a6a6;
      border-radius: 9px;
      overflow: hidden;
      background: #fff;
    }
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .schedule-table thead th {
      background: rgba(173, 48, 4, 0.78);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 8px;
      border-right: 1px solid rgba(255, 255, 255, 0.25);
    }
    .schedule-table thead th:last-child {
      border-right: none;
    }
    .schedule-table th:first-child,
    .schedule-table td:first-child {
      width: 29%;
      text-align: center;
      border-right: 1px solid #a3a3a3;
    }
    .schedule-table td {
      border-top: 1px solid #a3a3a3;
      padding: 16px 8px;
      color: #444;
      font-size: 14px;
      text-align: center;
      line-height: 1.65;
      vertical-align: middle;
      word-break: break-word;
    }
    .schedule-table tbody tr:nth-child(even) td {
      background: #edf2f5;
    }
    .hall-name {
      font-weight: 600;
      color: #505050;
    }
    .hall-time {
      color: #444;
      font-weight: 500;
    }
    .warm-tip {
      margin-top: 14px;
      padding: 10px 8px 2px;
      border-top: 1px solid #efefef;
      font-size: 12px;
      color: #9b9b9b;
      line-height: 1.7;
    }
    .no-schedule-msg {
      font-size: 14px;
      color: #777;
      padding: 20px 12px;
      text-align: center;
      border: 1px dashed #d2d2d2;
      border-radius: 8px;
      background: #fafafa;
      margin-top: 8px;
    }
    .empty, .loading, .error {
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
      color: #f5f5f5;
      line-height: 1.6;
    }
    .error { color: #ffd7d2; }

    @media (max-width: 375px) {
      .venue-card {
        padding: 18px 8px 10px;
      }
      .board-title {
        margin-bottom: 7px;
      }
      .board-title-main {
        font-size: 21px;
      }
      .board-title-sub {
        font-size: 17px;
      }
      .board-subtitle {
        font-size: 15px;
      }
      .schedule-table thead th {
        font-size: 14px;
        padding: 10px 6px;
      }
      .schedule-table td {
        font-size: 13px;
        padding: 12px 6px;
      }
    }
    @media (max-width: 320px) {
      .board-title-main {
        font-size: 19px;
      }
      .board-title-sub {
        font-size: 16px;
      }
      .schedule-table td,
      .schedule-table thead th {
        font-size: 12px;
      }
    }
  </style>
</head>

  function getToday() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }


  function formatTime(s) {
    if (!s) return "--";
    const parts = String(s).split(":");
    if (parts.length >= 2) return `${parts[0]}:${parts[1]}`;
    return s;
  }

  function formatDateCn(dateStr) {
    if (!dateStr) return "--";
    const [y, m, d] = String(dateStr).split("-");
    if (!y || !m || !d) return dateStr;
    return `${y}年${m}月${d}日`;
  }

  function renderVenueSchedules(venue) {
    return (venue.daily_schedules || []).map((day) => {
      if (day.is_today && !day.has_schedules) {
        return {
          date: day.date,
          day_of_week: day.day_of_week,
          message: day.no_schedule_message || "今日该场馆没有排班"
        };
      }
      const fgs = day.floor_groups && day.floor_groups.length
        ? day.floor_groups.map((fg) => ({
            floor: fg.floor_text,
            schedules: fg.schedules || []
          }))
        : (day.schedules && day.schedules.length)
          ? [{ floor: "排班", schedules: day.schedules }]
          : [];
      return {
        date: day.date,
        day_of_week: day.day_of_week,
        floorGroups: fgs
      };
    });
  }

  function buildRequestPayload(start_date, end_date) {
    return {
      // 兼容新版 ListParams
      page_no: 1,
      page_size: 20,
      filter_items: {},
      search_items: {},
      time_items: {},
      join_items: {},
      order_by_items: {},
      none_items: {},
      or_items: {},
      custom_items: { start_date, end_date },
      is_page: false,
      is_count: false,
      is_sum: false,
      fields_to_sum: [],
      // 兼容旧版直传参数
      start_date,
      end_date
    };
  }

  function extractVenues(json) {
    // success 字段不存在时，按成功处理；仅在明确 false 时抛错
    if (json && json.success === false) {
      throw new Error(json.error || json.message || "接口返回错误");
    }

    const data = (json && (json.data || json.result)) || json || {};

    if (Array.isArray(data)) return data;
    if (Array.isArray(data.venues)) return data.venues;
    if (Array.isArray(data.list)) return data.list;
    if (Array.isArray(data.items)) return data.items;
    if (Array.isArray(data.records)) return data.records;

    return [];
  }

  async function fetchAllVenues() {
    const today = getToday();
    const start_date = today;
    const end_date = today;

    const statusContainer = document.getElementById("statusContainer");
    const venueContainer = document.getElementById("venueContainer");
    statusContainer.innerHTML = `<div class="loading">加载中...</div>`;
    venueContainer.innerHTML = "";

    try {
      let json;
      if (USE_MOCK) {
        json = MOCK_RESPONSE;
      } else {
        const res = await fetch(API_BASE + API_PATH, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(buildRequestPayload(start_date, end_date))
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        json = await res.json();
      }
      const venues = extractVenues(json);

      statusContainer.innerHTML = "";

      if (!venues.length) {
        venueContainer.innerHTML = `<div class="empty">今日暂无场馆排班</div>`;
        return;
      }

      venueContainer.innerHTML = venues.map((venue) => {
        const blocks = renderVenueSchedules(venue);
        const normalBlock = blocks.find((b) => !b.message) || blocks[0] || {};
        const dateText = formatDateCn(normalBlock.date || today);
        const hallRows = ((normalBlock.floorGroups || []).map((fg) => {
          const times = (fg.schedules || [])
            .map((s) => formatTime(s.start_time))
            .filter((t) => t && t !== "--");
          const uniqueTimes = [...new Set(times)];
          return {
            hall: fg.floor || "未命名展厅",
            times: uniqueTimes.length ? uniqueTimes.join("、 ") : "--"
          };
        }));

        const rowsHtml = hallRows.length
          ? hallRows
            .map((row) => `
              <tr>
                <td class="hall-name">${row.hall}</td>
                <td class="hall-time">${row.times}</td>
              </tr>
            `).join("")
          : "";

        return `
          <div class="venue-card">
            <div class="board-title">
              <span class="board-title-main">上海历史博物馆</span>
              <span class="board-title-sub">志愿者展厅导览时间</span>
            </div>
            <div class="board-subtitle">${dateText}　${venue.venue_name || "场馆"}</div>
            ${hallRows.length ? `
              <div class="schedule-table-wrap">
                <table class="schedule-table">
                  <thead>
                    <tr>
                      <th>展厅</th>
                      <th>志愿者导览时间</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${rowsHtml}
                  </tbody>
                </table>
              </div>
            ` : `<div class="no-schedule-msg">${normalBlock.message || "今日该场馆暂无导览排班"}</div>`}
            <div class="warm-tip">温馨提示：以上为展览开放时间，如遇不可抗因素取消敬请谅解。</div>
          </div>`;
      }).join("");
    } catch (error) {
      statusContainer.innerHTML = `<div class="error">加载失败：${error.message}</div>`;
    }
  }

  document.addEventListener("DOMContentLoaded", fetchAllVenues);
</script>
</body>
</html>
