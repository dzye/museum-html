<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>场馆排班列表</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <style>
    :root {
      --brand: #ad3004;
      --brand-deep: #7f1f00;
      --brand-soft: #f6e3db;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #f0f0f0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { 
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      height: 100%;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
      Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 15% 20%, rgba(173,48,4,0.05), transparent 30%), radial-gradient(circle at 80% 0%, rgba(255,255,255,0.6), transparent 35%), #f7f8fb;
      color: var(--text);
      padding: 12px;
      padding-left: max(12px, env(safe-area-inset-left));
      padding-right: max(12px, env(safe-area-inset-right));
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      padding-top: max(12px, env(safe-area-inset-top));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      min-height: -webkit-fill-available;
    }
    .page { 
      width: 100%;
      margin: 0 auto 24px;
      max-width: 960px;
    }

    .app-header {
      background: linear-gradient(135deg, var(--brand), var(--brand-deep));
      color: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(173, 48, 4, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .header-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
    }
    .header-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.4;
      word-break: break-word;
    }
    .header-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 13px;
      opacity: 0.9;
    }
    .header-meta .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.7);
      display: inline-flex;
    }
    .header-status {
      background: rgba(255,255,255,0.16);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,0.25);
    }
    .header-location {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .header-side {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      min-width: 0;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .header-stats {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .header-date {
      font-size: 13px;
      padding: 8px 12px;
      background: rgba(255,255,255,0.14);
      border-radius: 999px;
      backdrop-filter: blur(4px);
      white-space: nowrap;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .header-count {
      font-size: 13px;
      opacity: 0.9;
      white-space: nowrap;
    }
    .header-stats .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.6);
      display: inline-flex;
    }

    .venue-info {
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
      margin-bottom: 14px;
      border: 1px solid var(--border);
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 16px;
    }
    .venue-info strong { color: var(--text); }
    .venue-info a {
      color: var(--brand);
      text-decoration: none;
      -webkit-tap-highlight-color: rgba(173, 48, 4, 0.12);
    }

    .schedule-card {
      background: var(--card);
      border-radius: 10px;
      padding: 14px 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      -webkit-tap-highlight-color: transparent;
      width: 100%;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }
    .schedule-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 8px;
      flex-wrap: wrap;
    }
    .schedule-title { 
      font-size: 15px; 
      font-weight: 600;
      line-height: 1.5;
      flex: 1;
      min-width: 0;
      word-break: break-word;
    }
    .schedule-header > div:last-child {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      flex-shrink: 0;
    }
    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      white-space: nowrap;
      line-height: 1.3;
      min-height: 22px;
      display: inline-flex;
      align-items: center;
    }
    .badge-status { background: rgba(173,48,4,0.1); color: var(--brand); }
    .badge-reg { background: #f5f5f5; color: #555; border: 1px dashed #e4e4e4; }

    .schedule-time {
      font-size: 14px;
      color: var(--brand);
      margin-top: 8px;
      margin-bottom: 8px;
      font-weight: 500;
      line-height: 1.5;
    }
    .schedule-sub { 
      font-size: 13px; 
      color: #555; 
      margin-bottom: 8px;
      line-height: 1.6;
      word-break: break-word;
    }
    .schedule-extra { 
      font-size: 12px; 
      color: #999;
      line-height: 1.5;
    }

    .venue-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px 18px;
      margin-bottom: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 6px 18px rgba(0,0,0,0.05);
    }
    .venue-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .venue-meta {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }
    .venue-meta strong { color: var(--text); }
    .floor-group {
      margin-bottom: 14px;
    }
    .floor-group:last-child { margin-bottom: 0; }
    .floor-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--brand);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .floor-title::before {
      content: "";
      width: 4px;
      height: 14px;
      background: var(--brand);
      border-radius: 2px;
    }
    .day-block {
      margin-bottom: 16px;
    }
    .day-block:last-child { margin-bottom: 0; }
    .day-header {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .day-header .date-tag {
      background: var(--brand-soft);
      color: var(--brand);
      padding: 4px 10px;
      border-radius: 8px;
      font-weight: 500;
    }
    .day-header .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); }
    .no-schedule-msg {
      font-size: 13px;
      color: #999;
      padding: 12px 14px;
      background: #f9f9f9;
      border-radius: 10px;
      border: 1px dashed #e8e8e8;
    }
    .empty, .loading, .error {
      text-align: center;
      padding: 40px 20px;
      font-size: 14px;
      color: #777;
      line-height: 1.6;
    }
    .error { color: #c0392b; }

    /* 移动端横屏适配 */
    @media (orientation: landscape) and (max-height: 500px) {
      body {
        padding: 8px;
      }
      .venue-card,
      .schedule-card {
        padding: 12px;
        margin-bottom: 10px;
      }
    }

    /* 小屏幕优化 (iPhone SE等) */
    @media (max-width: 375px) {
      body {
        padding: 10px;
        padding-left: max(10px, env(safe-area-inset-left));
        padding-right: max(10px, env(safe-area-inset-right));
      }
      .venue-card {
        padding: 14px;
        border-radius: 10px;
      }
      .venue-name {
        font-size: 16px;
      }
      .venue-meta {
        font-size: 12px;
      }
      .schedule-card {
        padding: 12px 14px;
      }
      .schedule-title {
        font-size: 14px;
      }
      .schedule-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }
      .schedule-header > div:last-child {
        margin-top: 0;
      }
      .schedule-time,
      .schedule-sub {
        font-size: 13px;
      }
    }

    /* 超小屏幕优化 */
    @media (max-width: 320px) {
      body {
        padding: 8px;
        padding-left: max(8px, env(safe-area-inset-left));
        padding-right: max(8px, env(safe-area-inset-right));
      }
      .venue-name {
        font-size: 15px;
      }
      .venue-meta {
        font-size: 11px;
      }
      .schedule-title {
        font-size: 13px;
      }
      .badge {
        font-size: 10px;
        padding: 3px 8px;
      }
      .schedule-time {
        font-size: 12px;
      }
      .schedule-sub {
        font-size: 12px;
      }
    }

    /* 大屏移动设备优化 */
    @media (min-width: 414px) {
      .venue-name {
        font-size: 18px;
      }
      .schedule-title {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
<div class="page">
  <header class="app-header">
    <div class="header-main">
      <div class="header-title" id="headerVenue">场馆排班</div>
      <div class="header-meta">
        <span class="header-status" id="headerDateRange">--</span>
      </div>
    </div>
  </header>
  <div id="statusContainer"></div>
  <div id="venueContainer"></div>
</div>

<script>
  // ============= 配置区域 =============
  // const API_BASE = "https://www.historychannel.top/api_sched";
  const API_BASE = "";
  const API_PATH = "/api_sched/h5/venue/all_venues_schedules";

  function getToday() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }


  function formatTime(s) {
    if (!s) return "--";
    const parts = String(s).split(":");
    if (parts.length >= 2) return `${parts[0]}:${parts[1]}`;
    return s;
  }

  function renderVenueSchedules(venue) {
    return (venue.daily_schedules || []).map((day) => {
      if (day.is_today && !day.has_schedules) {
        return {
          date: day.date,
          day_of_week: day.day_of_week,
          message: day.no_schedule_message || "今日该场馆没有排班"
        };
      }
      const fgs = day.floor_groups && day.floor_groups.length
        ? day.floor_groups.map((fg) => ({
            floor: fg.floor_text,
            schedules: fg.schedules || []
          }))
        : (day.schedules && day.schedules.length)
          ? [{ floor: "排班", schedules: day.schedules }]
          : [];
      return {
        date: day.date,
        day_of_week: day.day_of_week,
        floorGroups: fgs
      };
    });
  }

  function buildRequestPayload(start_date, end_date) {
    return {
      // 兼容新版 ListParams
      page_no: 1,
      page_size: 20,
      filter_items: {},
      search_items: {},
      time_items: {},
      join_items: {},
      order_by_items: {},
      none_items: {},
      or_items: {},
      custom_items: { start_date, end_date },
      is_page: false,
      is_count: false,
      is_sum: false,
      fields_to_sum: [],
      // 兼容旧版直传参数
      start_date,
      end_date
    };
  }

  function extractVenues(json) {
    // success 字段不存在时，按成功处理；仅在明确 false 时抛错
    if (json && json.success === false) {
      throw new Error(json.error || json.message || "接口返回错误");
    }

    const data = (json && (json.data || json.result)) || json || {};

    if (Array.isArray(data)) return data;
    if (Array.isArray(data.venues)) return data.venues;
    if (Array.isArray(data.list)) return data.list;
    if (Array.isArray(data.items)) return data.items;
    if (Array.isArray(data.records)) return data.records;

    return [];
  }

  async function fetchAllVenues() {
    const today = getToday();
    const start_date = today;
    const end_date = today;

    const statusContainer = document.getElementById("statusContainer");
    const venueContainer = document.getElementById("venueContainer");
    const headerRange = document.getElementById("headerDateRange");

    if (headerRange) {
      headerRange.textContent = today.replace(/-/g, ".");
    }

    statusContainer.innerHTML = `<div class="loading">加载中...</div>`;
    venueContainer.innerHTML = "";

    try {
      const res = await fetch(API_BASE + API_PATH, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(buildRequestPayload(start_date, end_date))
      });

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const json = await res.json();
      const venues = extractVenues(json);

      statusContainer.innerHTML = "";

      if (!venues.length) {
        venueContainer.innerHTML = `<div class="empty">今日暂无场馆排班</div>`;
        return;
      }

      venueContainer.innerHTML = venues.map((venue) => {
        const blocks = renderVenueSchedules(venue);
        const dayHtml = blocks.map((block) => {
          if (block.message) {
            return `
              <div class="day-block">
                <div class="day-header">
                  <span class="date-tag">${block.date.replace(/-/g, ".")} ${block.day_of_week}</span>
                  <span class="dot"></span>
                </div>
                <div class="no-schedule-msg">${block.message}</div>
              </div>`;
          }
          const floorHtml = (block.floorGroups || [])
            .map(
              (fg) => `
              <div class="floor-group">
                <div class="floor-title">${fg.floor}</div>
                <div class="floor-schedules">
                  ${(fg.schedules || [])
                    .map(
                      (s) => `
                    <div class="schedule-card">
                      <div class="schedule-header">
                        <div class="schedule-title">${s.shift_type_text || ""} · ${s.position_text || ""}</div>
                      </div>
                      <div class="schedule-time">${formatTime(s.start_time)}</div>
                    </div>`
                    )
                    .join("")}
                </div>
              </div>`
            )
            .join("");
          return `
            <div class="day-block">
              <div class="day-header">
                <span class="date-tag">${block.date.replace(/-/g, ".")} ${block.day_of_week}</span>
                <span class="dot"></span>
              </div>
              ${floorHtml}
            </div>`;
        }).join("");

        let meta = "";
        if (venue.description) meta += `<div class="venue-meta"><strong>简介：</strong>${venue.description}</div>`;
        if (venue.volunteer_requirements) meta += `<div class="venue-meta"><strong>志愿者要求：</strong>${venue.volunteer_requirements}</div>`;
        return `
          <div class="venue-card">
            <div class="venue-name">${venue.venue_name || "未命名场馆"}</div>
            ${meta}
            <div class="venue-days">${dayHtml}</div>
          </div>`;
      }).join("");
    } catch (error) {
      statusContainer.innerHTML = `<div class="error">加载失败：${error.message}</div>`;
    }
  }

  document.addEventListener("DOMContentLoaded", fetchAllVenues);
</script>
</body>
</html>
